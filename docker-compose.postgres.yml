# Postgres deployment — for self-hosted setups that prefer Postgres over SQLite,
# or for local development/testing.
# No billing, no request limits by default.
#
# Quick start:
#   1. Copy .env.example to .env and fill in your secrets
#   2. docker compose -f docker-compose.postgres.yml up -d
#
# For multi-instance (horizontal scaling) with Redis pub/sub:
#   - Uncomment the redis service below
#   - Uncomment REDIS_URL on the relay service
#   - Or set REDIS_URL in .env to point at a managed Redis (Upstash, Fly Redis, etc.)
#
services:
  db:
    image: postgres:16
    container_name: foundryvtt-relay-db
    environment:
      - POSTGRES_DB=foundryvtt_relay
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  relay:
    build:
      context: .
      dockerfile: go-relay/Dockerfile
    container_name: foundryvtt-rest-api-relay
    env_file: .env
    environment:
      - PORT=3010
      - DB_TYPE=postgres
      - DATABASE_URL=postgres://postgres:postgres@db:5432/foundryvtt_relay
      - APP_ENV=production
      - MONTHLY_REQUEST_LIMIT=0
      - WEBSOCKET_PING_INTERVAL_MS=20000
      - CLIENT_CLEANUP_INTERVAL_MS=15000
      # - REDIS_URL=redis://redis:6379  # uncomment if using the redis service below,
      #                                 # or set to your managed Redis URL in .env
    volumes:
      - ./data:/app/data
    ports:
      - "3010:3010"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # redis:
  #   image: redis:7-alpine
  #   container_name: foundryvtt-relay-redis
  #   restart: unless-stopped

volumes:
  postgres_data:
